; Minimal hazo_auth config for the hazo_feedback test-app.
; The cookie_prefix is REQUIRED by hazo_auth — without it, ensure_anon_id() throws.

[hazo_auth__cookies]
cookie_prefix = hazo_feedback_test_

; hazo_auth's hazo_connect singleton — used by hazo_get_auth to look up
; users/permissions. We point it at the same SQLite file used by hazo_feedback,
; so a single bootstrap call seeds the test admin and the admin endpoint can
; resolve them.
[hazo_connect]
type = sqlite
sqlite_path = test-app.db
enable_admin_ui = false
