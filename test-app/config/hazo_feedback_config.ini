[app]
app_id = test-app

[admin]
admin_scope = hazo_feedback:test-app:admin

[rate_limit]
per_anon_count = 100
per_anon_window_ms = 60000
per_user_count = 500
per_user_window_ms = 3600000
per_ip_count = 500
per_ip_window_ms = 60000

[attachments]
max_count = 5
max_bytes_per_file = 10485760
total_max_bytes = 26214400

[notify]
acknowledge_email_enabled = true
acknowledge_email_from = feedback@example.com
acknowledge_email_from_name = hazo_feedback Test
acknowledge_email_subject = We received your feedback ({{ref_id}})
